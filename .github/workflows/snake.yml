name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - .github/workflows/snake.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Generate snake SVG
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: betuko37
          outputs: |
            profile/github-contribution-grid-snake.svg?palette=github-dark&color_snake=F85D7F&color_dots=161B22,30363D,21262D,F85D7F,F8D866
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/github-contribution-grid-snake.svg
          git diff --staged --quiet || git commit -m "chore: update snake animation"
          git push
