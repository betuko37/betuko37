name: Update README Stats

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&hide_border=true&bg_color=1A0B2E&title_color=FFFFFF&icon_color=A855F7&text_color=E9D5FF&include_all_commits=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&layout=compact&hide_border=true&bg_color=1A0B2E&title_color=FFFFFF&text_color=E9D5FF&hide=html,css,scss&langs_count=8
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate pinned repo card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: pin
          options: username=${{ github.repository_owner }}&repo=nfc-service&hide_border=true&bg_color=1A0B2E&title_color=FFFFFF&icon_color=A855F7&text_color=E9D5FF
          path: profile/pin-nfc-service.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix purple card backgrounds for GitHub rendering
        run: |
          python3 <<'PY'
          fixes = {
            "profile/stats.svg": ("467", "195", "194", "466"),
            "profile/top-langs.svg": ("300", "190", "189", "299"),
            "profile/pin-nfc-service.svg": ("400", "120", "119", "399"),
          }
          for path, (w, h, rh, rw) in fixes.items():
            with open(path, encoding="utf-8") as f:
              content = f.read()
            marker = f'<rect width="{w}" height="{h}" fill="#1A0B2E"/>'
            if marker not in content:
              content = content.replace(
                '        <rect\n          data-testid="card-bg"',
                f'        {marker}\n        <rect\n          data-testid="card-bg"',
                1,
              )
            content = content.replace('height="99%"', f'height="{rh}"')
            content = content.replace('stroke="#e4e2e2"', 'stroke="#A855F7"')
            with open(path, "w", encoding="utf-8") as f:
              f.write(content)
          PY

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git diff --staged --quiet || git commit -m "chore: update profile stats cards"
          git push
